<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="auth-box">
    <h2>Signup 📝</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST" onsubmit="return validateForm()">
        <input name="username" placeholder="Username" required>
        
        <div class="password-box">
            <input id="password" name="password" type="password" placeholder="Password" required>
            <span class="toggle-eye" onclick="togglePassword()">👁</span>
        </div>

        <div class="password-box">
            <input id="confirmPassword" name="confirm_password" type="password" placeholder="Confirm Password" required>
            <span class="toggle-eye" onclick="toggleConfirmPassword()">👁</span>
        </div>

        <button type="submit">Signup</button>
    </form>

    <br>
    <a href="/login">Already have account?</a>
</div>

<script>
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

function toggleConfirmPassword() {
    const pass = document.getElementById("confirmPassword");
    pass.type = pass.type === "password" ? "text" : "password";
}

function validateForm() {
    const pass = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;
    if (pass !== confirm) {
        alert("Passwords do not match!");
        return false;
    }
    return true;
}
</script>

</body>
</html>
