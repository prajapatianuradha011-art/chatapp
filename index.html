<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WhatsApp Chat</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="app.py">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<a href="/logout" class="logout-btn">
    🔓 Logout
</a>

<div class="chat-container">
    <div id="users-box">
        <h4>🟢 Online Users</h4>
        <ul id="users"></ul>
    </div>

    <!-- Header -->  
    <div class="header">
        <h3>💬 My chatting website</h3>
        <input id="username" placeholder="Your name" />
    </div>

    <!-- Chat Area -->
    <div id="chat-box">
        <ul id="messages"></ul>
        <div id="typing-status"></div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <input id="message" placeholder="Type a message..." />
        <button onclick="sendMessage()">➤</button>
        <button onclick="toggleEmoji()">😊</button>
        <button onclick="startRecording()">🎤</button>
        <div id="emoji-box" style="display:none;"></div>
    </div>
</div>

<script>
    const socket = io();
    let myName = '';
    let typingTimeout;
    let mediaRecorder;
    let audioChunks = [];

    // Consolidated message handler
    socket.on('message', function(data) {
        const item = document.createElement('li');
        myName = document.getElementById('username').value || '{{ username }}';

        if (data.username === myName) {
            item.className = 'my-message';

            item.id = data.id;       // ✅ ADD THIS LINE HERE

            item.innerHTML = `

                <span>${data.msg}</span><br>
                <small>${data.username}</small>
                <div class="ticks" id="tick-${data.id}">✔</div>
            `;
        } else {
            item.className = 'other-message';
            item.innerHTML = `
                <span>${data.msg}</span><br>
                <small>${data.username}</small>
            `;
            socket.emit('seen', {id: data.id});
        }

        document.getElementById('messages').appendChild(item);
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        

        item.innerHTML = `
    <span class="msg-text">${data.msg}</span>

    ${data.username === myName ? `
        <div class="actions">
            <button onclick="editMsg('${data.id}')">✏️</button>
            <button onclick="deleteMsg('${data.id}')">🗑</button>
        </div>
    ` : ""}

    <div class="msg-info">
        <small>${data.time || ""}</small>
    </div>
`;
    });

    // Tick updates
    socket.on('delivered', function(data) {
        const tick = document.getElementById('tick-' + data.id);
        if (tick) tick.innerHTML = '✔✔';
    });

    socket.on('seen', function(data) {
        const tick = document.getElementById('tick-' + data.id);
        if (tick) {
            tick.innerHTML = '✔✔';
            tick.style.color = '#4fc3f7';
        }
    });

    // Typing indicator
    socket.on('typing', function(data) {
        if (data.username !== myName) {
            document.getElementById('typing-status').innerText = data.username + ' is typing...';
        }
    });

    // User list
    socket.on('user_list', function(users) {
        const list = document.getElementById('users');
        list.innerHTML = '';
        users.forEach(user => {
            const li = document.createElement('li');
            li.innerText = '🟢 ' + user;
            list.appendChild(li);
        });
    });

    // Send message
    function sendMessage() {
        const msg = document.getElementById('message').value.trim();
        const username = document.getElementById('username').value || '{{ username }}';
        if (!msg || !username) return;

        socket.emit('message', {msg: msg});
        document.getElementById('message').value = '';
    }

    // Enter key send
    document.getElementById('message').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // Typing events
    document.getElementById('message').addEventListener('input', function() {
        const username = document.getElementById('username').value || '{{ username }}';
        socket.emit('typing', {username: username});
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            document.getElementById('typing-status').innerText = '';
        }, 2000);
    });

    // Join room
    document.getElementById('username').addEventListener('change', function() {
        const username = this.value.trim();
        if (username) socket.emit('join', {username: username});
    });

    // Emoji picker
    const emojis = ['😀','😄','😁','😅','😆','😂','🤣','😙','😚','😘','🥰','😍','😭','🥳','🤩',
                    '😊','☺️','😝','😜','🤭','😤','😡','🤬','💘','💝','💖','💞','❤️‍🩹','💗'];
    function toggleEmoji() {
        const box = document.getElementById('emoji-box');
        box.style.display = box.style.display === 'none' ? 'block' : 'none';
        if (box.style.display === 'block') {
            box.innerHTML = '';
            emojis.forEach(e => {
                const span = document.createElement('span');
                span.innerText = e;
                span.style.cssText = 'font-size:20px;margin:5px;cursor:pointer';
                span.onclick = () => document.getElementById('message').value += e;
                box.appendChild(span);
            });
        }
    }

    // Voice recording
    async function startRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({audio: true});
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks);
                const audioURL = URL.createObjectURL(audioBlob);
                socket.emit('message', {
                    msg: `<audio controls src="${audioURL}"></audio>`
                });
                stream.getTracks().forEach(track => track.stop());
            };
            mediaRecorder.start();
            setTimeout(() => mediaRecorder.stop(), 3000);
        } catch (err) {
            console.error('Recording failed:', err);
        }
    };


// EDIT
function editMsg(id){
    let newMsg = prompt("Edit your message:");
    if(newMsg){
        socket.emit('edit_message', {
            id: id,
            msg: newMsg
        });
    }
}

// DELETE
function deleteMsg(id){
    if(confirm("Delete this message?")){
        socket.emit('delete_message', {id: id});
        
    }
}

// update edited message
socket.on('message_edited', function(data){
    let msg = document.querySelector(`#${data.id} .msg-text`);
    if(msg){
        msg.innerText = data.msg;
    }
});

// remove deleted message
socket.on('message_deleted', function(data){
    let item = document.getElementById(data.id);
    if(item){
        item.remove();
    }
});

</script>

</body>
</html>
