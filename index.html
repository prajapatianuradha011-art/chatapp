<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
        #header { background: #075e54; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        #header h2 { font-size: 18px; }
        #header a { color: #ccc; text-decoration: none; font-size: 14px; }
        #status { font-size: 12px; color: #aed6f1; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg-bubble { max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.4; position: relative; }
        .msg-bubble.mine { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-bubble.theirs { background: white; align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg-bubble .sender { font-weight: bold; font-size: 12px; color: #075e54; margin-bottom: 3px; }
        .msg-bubble .text { word-break: break-word; }
        .msg-bubble .actions { font-size: 11px; color: #999; margin-top: 5px; display: none; gap: 8px; }
        .msg-bubble:hover .actions { display: flex; }
        .actions span { cursor: pointer; color: #075e54; }
        .actions span:hover { text-decoration: underline; }
        #input-area { background: white; padding: 12px 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        #msg-input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 14px; }
        #send-btn { background: #075e54; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-size: 14px; }
        #send-btn:hover { background: #128c7e; }
        .system-msg { text-align: center; font-size: 12px; color: #999; padding: 4px; }
    </style>
</head>
<body>

<div id="header">
    <div>
        <h2>💬 Chat App</h2>
        <span id="status">Connecting...</span>
    </div>
    <a href="/logout">Logout</a>
</div>

<div id="messages"></div>

<div id="input-area">
    <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off" />
    <button id="send-btn">Send</button>
</div>

<!-- ✅ MUST use same version as server's flask-socketio -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
    const currentUser = "{{ username }}";
    const messagesDiv = document.getElementById('messages');
    const msgInput = document.getElementById('msg-input');
    const statusEl = document.getElementById('status');

    // ✅ Connect to SocketIO
    const socket = io({
        transports: ['websocket', 'polling'],  // try websocket first, fallback to polling
        reconnectionAttempts: 5,
        reconnectionDelay: 1000
    });

    // ── Connection status ──────────────────────────────────────────────────────

    socket.on('connect', () => {
        statusEl.textContent = '🟢 Connected';
        console.log('Connected:', socket.id);
    });

    socket.on('disconnect', () => {
        statusEl.textContent = '🔴 Disconnected';
    });

    socket.on('connect_error', (err) => {
        statusEl.textContent = '⚠️ Connection error';
        console.error('Connection error:', err);
    });

    // ── Load history ───────────────────────────────────────────────────────────

    socket.on('history', (messages) => {
        messagesDiv.innerHTML = '';
        messages.forEach(m => addMessage(m.id, m.username, m.msg));
        scrollToBottom();
    });

    // ── Receive new message ────────────────────────────────────────────────────

    socket.on('new_message', (data) => {
        addMessage(data.id, data.username, data.msg);
        scrollToBottom();
    });

    // ── Edit/Delete events ─────────────────────────────────────────────────────

    socket.on('message_edited', (data) => {
        const el = document.querySelector(`[data-id="${data.id}"] .text`);
        if (el) el.textContent = data.msg;
    });

    socket.on('message_deleted', (data) => {
        const el = document.querySelector(`[data-id="${data.id}"]`);
        if (el) el.remove();
    });

    // ── User join/leave ────────────────────────────────────────────────────────

    socket.on('user_joined', (data) => {
        addSystemMsg(`${data.username} joined the chat`);
    });

    socket.on('user_left', (data) => {
        addSystemMsg(`${data.username} left the chat`);
    });

    // ── Send message ───────────────────────────────────────────────────────────

    function sendMessage() {
        const msg = msgInput.value.trim();
        if (!msg) return;
        socket.emit('message', { msg });
        msgInput.value = '';
    }

    document.getElementById('send-btn').addEventListener('click', sendMessage);

    msgInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // ── Helpers ────────────────────────────────────────────────────────────────

    function addMessage(id, username, msg) {
        const isMine = username === currentUser;
        const bubble = document.createElement('div');
        bubble.className = `msg-bubble ${isMine ? 'mine' : 'theirs'}`;
        bubble.dataset.id = id;

        bubble.innerHTML = `
            ${!isMine ? `<div class="sender">${escapeHtml(username)}</div>` : ''}
            <div class="text">${escapeHtml(msg)}</div>
            ${isMine ? `
            <div class="actions">
                <span onclick="editMsg(${id}, this)">✏️ Edit</span>
                <span onclick="deleteMsg(${id})">🗑️ Delete</span>
            </div>` : ''}
        `;
        messagesDiv.appendChild(bubble);
    }

    function addSystemMsg(text) {
        const div = document.createElement('div');
        div.className = 'system-msg';
        div.textContent = text;
        messagesDiv.appendChild(div);
        scrollToBottom();
    }

    function editMsg(id, el) {
        const bubble = el.closest('.msg-bubble');
        const textEl = bubble.querySelector('.text');
        const newMsg = prompt('Edit message:', textEl.textContent);
        if (newMsg && newMsg.trim()) {
            socket.emit('edit_message', { id, msg: newMsg.trim() });
        }
    }

    function deleteMsg(id) {
        if (confirm('Delete this message?')) {
            socket.emit('delete_message', { id });
        }
    }

    function scrollToBottom() {
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }
</script>

</body>
</html>
